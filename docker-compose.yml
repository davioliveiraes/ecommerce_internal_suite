services:
  db:
    image: postgres:16-alpine
    container_name: ibeize_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ibeize}
      POSTGRES_USER: ${POSTGRES_USER:-ibeize}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ibeize}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ibeize}"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ibeize_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-ibeize}:${POSTGRES_PASSWORD:-ibeize}@db:5432/${POSTGRES_DB:-ibeize}
    volumes:
      - ./backend:/app
      - /app/__pycache__
    ports:
      - "8000:8000"
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

volumes:
  postgres_data:
